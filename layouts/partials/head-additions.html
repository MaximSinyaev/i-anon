{{/* Open Graph теги для красивых превью в соцсетях и мессенджерах */}}
<meta property="og:site_name" content="{{ .Site.Title }}" />
<meta property="og:title"
    content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}" />
<meta property="og:description"
    content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:locale" content="ru_RU" />
{{ with .Site.Params.site_logo }}
<meta property="og:image" content="{{ absURL (printf " images/%s" .) }}" />{{ end }}

{{/* Canonical URL — важно чтобы Google не считал страницы дублями */}}
<link rel="canonical" href="{{ .Permalink }}" />
